services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: speedlink
      POSTGRES_USER: speedlink
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:8.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: speedlink
      DB_USERNAME: speedlink
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPEEDLINK_JWT_SECRET: ${SPEEDLINK_JWT_SECRET:?Set SPEEDLINK_JWT_SECRET}
      SPEEDLINK_TOKEN_TTL_MINUTES: 720
      SPEEDLINK_CORS_ALLOWED_ORIGINS: ${SPEEDLINK_CORS_ALLOWED_ORIGINS:-https://www.speedlink.in,https://speedlink.in}
      SPEEDLINK_CORS_ALLOWED_ORIGIN_PATTERNS: ${SPEEDLINK_CORS_ALLOWED_ORIGIN_PATTERNS:-https://*.speedlink.in}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
