spring.application.name=speedlink
server.port=${PORT:${SERVER_PORT:8080}}
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:400}
server.tomcat.threads.min-spare=${SERVER_TOMCAT_THREADS_MIN_SPARE:40}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:10000}
server.tomcat.max-connections=${SERVER_TOMCAT_MAX_CONNECTIONS:100000}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/speedlink;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.data.redis.url=${SPRING_DATA_REDIS_URL:redis://localhost:6379}
speedlink.auth.jwt-secret=${SPEEDLINK_JWT_SECRET:change-me}
speedlink.auth.token-ttl-minutes=${SPEEDLINK_TOKEN_TTL_MINUTES:720}
speedlink.admin.key=${SPEEDLINK_ADMIN_KEY:}
speedlink.matching-window.enabled=${SPEEDLINK_MATCHING_WINDOW_ENABLED:true}
speedlink.matching-window.start=${SPEEDLINK_MATCHING_WINDOW_START:21:00}
speedlink.matching-window.end=${SPEEDLINK_MATCHING_WINDOW_END:22:00}
speedlink.matching-window.zone=${SPEEDLINK_MATCHING_WINDOW_ZONE:Asia/Kolkata}
speedlink.cors.allowed-origins=${SPEEDLINK_CORS_ALLOWED_ORIGINS:https://www.speedlink.in,https://speedlink.in,http://localhost:5173,http://127.0.0.1:5173}
speedlink.cors.allowed-origin-patterns=${SPEEDLINK_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.speedlink.in,https://speedlink.in,https://*.up.railway.app,https://*.vercel.app,http://localhost:*,http://127.0.0.1:*}
supabase.url=${SUPABASE_URL:https://gpcrjzkdorlmjmfwzglc.supabase.co}
supabase.publishable-key=${SUPABASE_PUBLISHABLE_KEY:${SUPABASE_ANON_KEY:sb_publishable_fDm-gw5-OIi-tpuwcioRow_hFN6XMyB}}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
