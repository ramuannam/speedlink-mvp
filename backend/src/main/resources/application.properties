spring.application.name=speedlink
server.port=${SERVER_PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/speedlink;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
server.port=${PORT:8080}
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
speedlink.auth.jwt-secret=${SPEEDLINK_JWT_SECRET:change-me}
speedlink.auth.token-ttl-minutes=${SPEEDLINK_TOKEN_TTL_MINUTES:720}
speedlink.cors.allowed-origins=${SPEEDLINK_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
