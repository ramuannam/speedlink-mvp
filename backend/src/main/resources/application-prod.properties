spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:speedlink}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:speedlink}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=validate
spring.h2.console.enabled=false
spring.jpa.open-in-view=false
spring.redis.host=${REDIS_HOST:redis}
spring.redis.port=${REDIS_PORT:6379}
speedlink.auth.jwt-secret=${SPEEDLINK_JWT_SECRET}
speedlink.auth.token-ttl-minutes=${SPEEDLINK_TOKEN_TTL_MINUTES:720}
speedlink.cors.allowed-origins=${SPEEDLINK_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}