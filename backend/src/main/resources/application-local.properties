# Production-like local development profile.
# Start local infrastructure with: docker-compose up -d postgres redis
# Run backend with: SPRING_PROFILES_ACTIVE=local

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:speedlink}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:speedlink}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.h2.console.enabled=false
spring.jpa.open-in-view=false

spring.data.redis.url=${REDIS_URL:redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}}

server.port=${PORT:8080}
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:400}
server.tomcat.threads.min-spare=${SERVER_TOMCAT_THREADS_MIN_SPARE:40}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:10000}
server.tomcat.max-connections=${SERVER_TOMCAT_MAX_CONNECTIONS:100000}

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}

speedlink.auth.jwt-secret=${SPEEDLINK_JWT_SECRET:local-dev-change-me-replace-this}
speedlink.auth.token-ttl-minutes=${SPEEDLINK_TOKEN_TTL_MINUTES:720}
speedlink.admin.key=${SPEEDLINK_ADMIN_KEY:}
speedlink.matching-window.enabled=${SPEEDLINK_MATCHING_WINDOW_ENABLED:true}
speedlink.matching-window.start=${SPEEDLINK_MATCHING_WINDOW_START:21:00}
speedlink.matching-window.end=${SPEEDLINK_MATCHING_WINDOW_END:22:00}
speedlink.matching-window.zone=${SPEEDLINK_MATCHING_WINDOW_ZONE:Asia/Kolkata}
speedlink.cors.allowed-origins=${SPEEDLINK_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
speedlink.cors.allowed-origin-patterns=${SPEEDLINK_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

supabase.url=${SUPABASE_URL:}
supabase.publishable-key=${SUPABASE_PUBLISHABLE_KEY:${SUPABASE_ANON_KEY:}}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
